<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Character Sheet</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
  :root{--ink:#1a1614;--parchment:#f5f3f0;--gold:#6b5d4f;--rust:#5c2e1a;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:#2a2520;background-image:repeating-linear-gradient(45deg,transparent,transparent 35px,rgba(0,0,0,.03) 35px,rgba(0,0,0,.03) 70px);font-family:'Crimson Text',serif;color:var(--ink);min-height:100vh;padding:20px;display:flex;justify-content:center;align-items:flex-start;}
  .sheet{background:var(--parchment);width:780px;max-width:100%;border:3px solid var(--gold);box-shadow:0 0 0 6px var(--parchment),0 0 0 9px var(--gold),0 20px 60px rgba(0,0,0,.4);position:relative;overflow:hidden;}
  .sheet::before{content:'';position:absolute;inset:12px;border:1px solid rgba(107,93,79,.25);pointer-events:none;z-index:0;}
  .corner{position:absolute;width:50px;height:50px;z-index:2;opacity:.5;}.corner svg{width:100%;height:100%;}
  .corner-tl{top:8px;left:8px;}.corner-tr{top:8px;right:8px;transform:scaleX(-1);}.corner-bl{bottom:8px;left:8px;transform:scaleY(-1);}.corner-br{bottom:8px;right:8px;transform:scale(-1);}
  .sheet-inner{padding:40px 40px 36px;position:relative;z-index:1;}

  .sheet-header{text-align:center;margin-bottom:22px;padding-bottom:14px;border-bottom:2px solid var(--gold);position:relative;}
  .sheet-header::after{content:'⬥ ⬦ ⬥';position:absolute;bottom:-10px;left:50%;transform:translateX(-50%);background:var(--parchment);padding:0 12px;color:var(--gold);font-size:14px;letter-spacing:6px;}
  .sheet-title{font-family:'Cinzel',serif;font-size:26px;font-weight:700;letter-spacing:8px;color:var(--rust);text-transform:uppercase;}
  .sheet-subtitle{font-family:'Cinzel',serif;font-size:10px;letter-spacing:5px;color:var(--gold);margin-top:3px;text-transform:uppercase;}

  .identity-row{display:grid;grid-template-columns:2fr 1fr;gap:14px;margin:26px 0 20px;}
  .field-group{display:flex;flex-direction:column;gap:2px;}
  .fl{font-family:'Cinzel',serif;font-size:8px;letter-spacing:2px;text-transform:uppercase;color:var(--gold);}
  .fi{border:none;border-bottom:1px solid var(--gold);background:transparent;font-family:'Crimson Text',serif;font-size:15px;color:var(--ink);padding:2px 0;outline:none;width:100%;}
  .fi:focus{border-bottom-color:var(--rust);}
  input::placeholder,textarea::placeholder{color:rgba(107,93,79,.45);font-style:italic;}

  .strip-label{font-family:'Cinzel',serif;font-size:8px;letter-spacing:2px;text-transform:uppercase;color:var(--gold);margin-bottom:5px;opacity:.8;}
  .attr-strip{display:flex;border:1px solid rgba(107,93,79,.25);background:rgba(107,93,79,.04);margin-bottom:22px;}
  .attr-cell{flex:1;display:flex;flex-direction:column;align-items:center;padding:7px 4px 6px;border-right:1px solid rgba(107,93,79,.15);}
  .attr-cell:last-child{border-right:none;}
  .attr-abbr{font-family:'Cinzel',serif;font-size:9px;font-weight:700;letter-spacing:2px;color:var(--rust);text-transform:uppercase;}
  .attr-die{font-family:'Cinzel',serif;font-size:13px;font-weight:700;color:var(--ink);margin-top:4px;width:46px;text-align:center;border:none;border-bottom:1.5px solid rgba(107,93,79,.4);background:transparent;outline:none;padding:0 2px;}

  .sec{background:rgba(107,93,79,.04);border:1px solid rgba(107,93,79,.22);padding:14px 16px;margin-bottom:18px;position:relative;}
  .sec:last-child{margin-bottom:0;}
  .st{font-family:'Cinzel',serif;font-size:10px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--rust);background:var(--parchment);padding:0 8px;position:absolute;top:-8px;left:14px;}

  /* Skills — two columns */
  .skills-grid{display:grid;grid-template-columns:1fr 1fr;gap:0 24px;}
  .skill-row{display:grid;grid-template-columns:1fr auto;align-items:center;gap:10px;padding:4px 0;border-bottom:1px dashed rgba(107,93,79,.18);}
  .skill-name{font-size:14px;}
  .sk-num{font-family:'Cinzel',serif;font-size:17px;font-weight:700;color:var(--rust);width:30px;text-align:center;border:none;border-bottom:1.5px solid rgba(92,46,26,.35);background:transparent;outline:none;padding:0;}

  /* Talents — single column with tier */
  .talent-row{display:grid;grid-template-columns:auto 1fr auto;gap:10px;align-items:center;padding:5px 0;border-bottom:1px dashed rgba(107,93,79,.18);}
  .talent-row:last-child{border-bottom:none;}
  .talent-num{font-family:'Cinzel',serif;font-size:9px;color:rgba(107,93,79,.45);}
  .talent-tier{font-family:'Cinzel',serif;font-size:10px;color:var(--gold);width:36px;text-align:center;border:none;border-bottom:1px solid rgba(107,93,79,.3);background:transparent;outline:none;padding:1px 0;}

  /* Merged advanced skills + notes — free textarea */
  .free-area{width:100%;background:transparent;border:none;font-family:'Crimson Text',serif;font-size:14px;color:var(--ink);padding:4px 0;resize:vertical;min-height:180px;outline:none;line-height:1.9;}

  .divider{text-align:center;color:var(--gold);font-size:13px;letter-spacing:8px;margin:6px 0 18px;opacity:.5;}

  @media print{
    @page{size:A4 portrait;margin:0;}
    html,body{margin:0;padding:0;background:#f5f3f0 !important;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
    body{display:block;padding:0;}
    .sheet{width:210mm;max-width:210mm;min-height:297mm;height:297mm;border:none;box-shadow:none;margin:0;padding:0;overflow:hidden;}
    .sheet-inner{padding:12mm 13mm 10mm;}
    .sheet-title{font-size:20px;}.sheet-subtitle{font-size:9px;}
    .identity-row{margin:14px 0 12px;}
    .attr-strip{margin-bottom:12px;}
    .sec{margin-bottom:10px;padding:9px 11px;}
    .skill-row{padding:2px 0;}.skill-name{font-size:12px;}
    input,textarea{border:none !important;border-bottom:1px solid rgba(107,93,79,.5) !important;background:transparent !important;-webkit-appearance:none;box-shadow:none;}
    textarea{border:none !important;}
    .free-area{border-bottom:1px solid rgba(107,93,79,.2) !important;min-height:120px;}
    .corner{display:none;}.sheet::before{display:none;}
  }
</style>
</head>
<body>
<div class="sheet">
  <div class="corner corner-tl" id="c1"></div><div class="corner corner-tr" id="c2"></div>
  <div class="corner corner-bl" id="c3"></div><div class="corner corner-br" id="c4"></div>
  <div class="sheet-inner">

    <div class="sheet-header">
      <div class="sheet-title">Adventurer's Record</div>
      <div class="sheet-subtitle">Character Sheet</div>
    </div>

    <div class="identity-row">
      <div class="field-group"><div class="fl">Character Name</div><input class="fi" type="text" placeholder="—"></div>
      <div class="field-group"><div class="fl">Origin / Race</div><input class="fi" type="text" placeholder="—"></div>
    </div>

    <div class="strip-label">Attributes</div>
    <div class="attr-strip" id="attr-strip"></div>

    <!-- Basic Skills -->
    <div class="sec">
      <div class="st">Basic Skills</div>
      <div style="height:8px"></div>
      <div class="skills-grid" id="skills-container"></div>
    </div>

    <!-- Talents -->
    <div class="sec">
      <div class="st">Talents</div>
      <div style="height:8px"></div>
      <div id="talents-container"></div>
    </div>

    <div class="divider">— ✦ —</div>

    <!-- Advanced Skills & Notes — merged free area -->
    <div class="sec">
      <div class="st">Advanced Skills &amp; Notes</div>
      <div style="height:8px"></div>
      <textarea class="free-area" placeholder="Advanced skills, backstory, contacts, quest notes, personal goals..."></textarea>
    </div>

  </div>
</div>
<script>
const SVG=`<svg viewBox="0 0 50 50" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M5 5 L5 28 M5 5 L28 5" stroke="#6b5d4f" stroke-width="2"/><path d="M5 5 L22 22" stroke="#6b5d4f" stroke-width="1" opacity="0.35"/><circle cx="5" cy="5" r="2.5" fill="#6b5d4f"/><circle cx="28" cy="5" r="1.5" fill="#6b5d4f" opacity="0.5"/><circle cx="5" cy="28" r="1.5" fill="#6b5d4f" opacity="0.5"/><path d="M12 5 L12 8" stroke="#6b5d4f" stroke-width="1" opacity="0.35"/><path d="M5 12 L8 12" stroke="#6b5d4f" stroke-width="1" opacity="0.35"/></svg>`;
['c1','c2','c3','c4'].forEach(id=>document.getElementById(id).innerHTML=SVG);

// Attribute strip
['STR','AGI','FIN','CON','MAGIC','WITS'].forEach(a=>{
  const cell=document.createElement('div');cell.className='attr-cell';
  cell.innerHTML=`<div class="attr-abbr">${a}</div>`;
  const inp=document.createElement('input');inp.className='attr-die';inp.type='text';inp.placeholder='d—';inp.maxLength=4;
  cell.appendChild(inp);document.getElementById('attr-strip').appendChild(cell);
});

// Basic Skills — 16 skills in two columns of 8
['Athletics','Acrobatics','Brawn','Endurance','Stealth','Navigation','Survival','Perception',
 'Animal Handling','Lore','Medicine','Sleight of Hand','Insight','Deception','Persuasion','Presence'
].forEach(name=>{
  const row=document.createElement('div');row.className='skill-row';
  const nm=document.createElement('div');nm.className='skill-name';nm.textContent=name;
  const inp=document.createElement('input');inp.className='sk-num';inp.type='text';inp.placeholder='1';inp.maxLength=1;
  row.appendChild(nm);row.appendChild(inp);
  document.getElementById('skills-container').appendChild(row);
});

// Talents — 4 rows, single column, name + tier
const tc=document.getElementById('talents-container');
for(let i=0;i<4;i++){
  const row=document.createElement('div');row.className='talent-row';
  const num=document.createElement('span');num.className='talent-num';num.textContent=`${i+1}.`;
  const ni=document.createElement('input');ni.className='fi';ni.type='text';ni.placeholder='—';
  const ti=document.createElement('input');ti.className='talent-tier';ti.type='text';ti.placeholder='Tier';ti.maxLength=1;
  row.appendChild(num);row.appendChild(ni);row.appendChild(ti);tc.appendChild(row);
}
</script>
</body>
</html>
