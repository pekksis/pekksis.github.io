<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Combat Sheet</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
  :root{--ink:#1a1614;--parchment:#f5f3f0;--gold:#6b5d4f;--rust:#5c2e1a;--blood:#6e1a1a;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:#2a2520;font-family:'Crimson Text',serif;color:var(--ink);min-height:100vh;padding:20px;display:flex;justify-content:center;align-items:flex-start;}
  .sheet{background:var(--parchment);width:780px;max-width:100%;border:3px solid var(--rust);box-shadow:0 0 0 6px var(--parchment),0 0 0 9px var(--rust),0 20px 60px rgba(0,0,0,.4);position:relative;overflow:hidden;}
  .sheet::before{content:'';position:absolute;inset:12px;border:1px solid rgba(92,46,26,.3);pointer-events:none;z-index:0;}
  .corner{position:absolute;width:50px;height:50px;z-index:2;opacity:.5;}.corner svg{width:100%;height:100%;}
  .corner-tl{top:8px;left:8px;}.corner-tr{top:8px;right:8px;transform:scaleX(-1);}.corner-bl{bottom:8px;left:8px;transform:scaleY(-1);}.corner-br{bottom:8px;right:8px;transform:scale(-1);}
  .sheet-inner{padding:36px 36px 32px;position:relative;z-index:1;}

  /* Adjusted Header Margins */
  .sheet-header{text-align:center;margin-bottom:35px;padding-bottom:18px;border-bottom:2px solid var(--rust);position:relative;}
  .sheet-header::after{content:'⚔ ✦ ⚔';position:absolute;bottom:-10px;left:50%;transform:translateX(-50%);background:var(--parchment);padding:0 12px;color:var(--rust);font-size:13px;letter-spacing:5px;}
  .sheet-title{font-family:'Cinzel',serif;font-size:26px;font-weight:700;letter-spacing:8px;color:var(--blood);text-transform:uppercase;margin-bottom:8px;}
  .sheet-subtitle{font-family:'Cinzel',serif;font-size:10px;letter-spacing:5px;color:var(--rust);margin-top:8px;text-transform:uppercase;opacity:.7;}

  /* Adjusted Identity Row Margins */
  .identity-row{margin:40px 0 40px;}
  .fl{font-family:'Cinzel',serif;font-size:8px;letter-spacing:2px;text-transform:uppercase;color:var(--rust);opacity:.8;}
  .fi{border:none;border-bottom:1px solid rgba(92,46,26,.4);background:transparent;font-family:'Crimson Text',serif;font-size:15px;color:var(--ink);padding:2px 0;outline:none;width:100%;}
  
  /* Adjusted Attribute Strip Margins */
  .strip-label{font-family:'Cinzel',serif;font-size:8px;letter-spacing:2px;text-transform:uppercase;color:var(--rust);margin-bottom:8px;opacity:.7;}
  .attr-strip{display:flex;border:1px solid rgba(92,46,26,.25);background:rgba(92,46,26,.04);margin-bottom:45px;}
  .attr-cell{flex:1;display:flex;flex-direction:column;align-items:center;padding:6px 4px;border-right:1px solid rgba(92,46,26,.15);}
  .attr-cell:last-child{border-right:none;}
  .attr-abbr{font-family:'Cinzel',serif;font-size:9px;font-weight:700;letter-spacing:2px;color:var(--rust);text-transform:uppercase;}
  .attr-die-ref{font-family:'Cinzel',serif;font-size:12px;font-weight:700;color:var(--ink);margin-top:3px;width:52px;text-align:center;border:none;border-bottom:1.5px solid rgba(92,46,26,.3);background:transparent;outline:none;padding:0 2px;}

  /* Base Section spacing increased */
  .sec{background:rgba(92,46,26,.04);border:1px solid rgba(92,46,26,.2);padding:12px 14px;margin-bottom:24px;position:relative;}
  .sec:last-child{margin-bottom:0;}
  .st{font-family:'Cinzel',serif;font-size:10px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--blood);background:var(--parchment);padding:0 8px;position:absolute;top:-8px;left:14px;}

  /* Made Strain & Injuries Taller */
  .sec-strain{margin-top:10px; padding-top: 24px; padding-bottom: 24px !important;}
  .strain-injury-grid{display:grid;grid-template-columns:11fr 14fr;gap:24px;align-items:center;}
  .strain-power-row{display:flex;gap:32px;align-items:flex-start;justify-content:center;}

  /* Scaled up the die hexagons */
  .die-slot{display:flex;flex-direction:column;align-items:center;gap:8px;}
  .die-label{font-family:'Cinzel',serif;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--rust);opacity:.7;}
  .die-outline{position:relative;}
  .die-outline-lg{width:130px;height:130px;} /* Increased from 100px */
  .die-outline-lg svg{width:100%;height:100%;}
  .die-val{position:absolute;inset:0;font-family:'Cinzel',serif;font-weight:700;color:var(--blood);border:none;background:transparent;outline:none;width:100%;text-align:center;padding:0;display:flex;align-items:center;justify-content:center;}
  .die-val-lg{font-size:38px;} /* Increased from 30px */
  .die-max-label{font-family:'Cinzel',serif;font-size:9px;letter-spacing:1px;text-transform:uppercase;color:rgba(92,46,26,.45);}
  .die-max-val{font-family:'Cinzel',serif;font-size:14px;font-weight:700;color:var(--ink);width:32px;text-align:center;border:none;border-bottom:1px solid rgba(92,46,26,.3);background:transparent;outline:none;padding:0;}

  /* Scaled up Injuries list */
  .injury-entry{display:grid;grid-template-columns:auto 1fr;gap:16px;align-items:center;margin-bottom:24px;} /* Increased margin-bottom */
  .injury-entry:last-child{margin-bottom:0;}
  .ib{width:40px;height:40px;border:2px solid var(--rust);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:'Cinzel',serif;font-size:14px;color:var(--rust);font-weight:700;flex-shrink:0;} /* Scaled up checkboxes */
  .ib.filled{background:var(--rust);color:var(--parchment);}
  .injury-label{font-family:'Cinzel',serif;font-size:9px;letter-spacing:1px;text-transform:uppercase;color:var(--rust);opacity:.6;}
  .injury-input{border:none;border-bottom:1px solid rgba(92,46,26,.3);background:transparent;font-family:'Crimson Text',serif;font-size:15px;color:var(--ink);padding:4px 0;outline:none;width:100%;}
  .deaths-door{display:flex;align-items:center;gap:8px;margin-top:24px;padding-top:20px;border-top:1px dashed rgba(92,46,26,.25);}
  .deaths-door-icon{font-size:16px;color:var(--blood);}
  .deaths-door-text{font-family:'Cinzel',serif;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--blood);}

  /* Adjusted Divider Margin */
  .divider{text-align:center;color:var(--rust);font-size:13px;letter-spacing:8px;margin:12px 0 28px;opacity:.5;}

  /* Techniques table */
  .tech-header{display:grid;grid-template-columns:100px 50px 1fr;gap:0;font-family:'Cinzel',serif;font-size:8px;letter-spacing:1px;text-transform:uppercase;color:var(--rust);opacity:.7;padding:0 0 5px;border-bottom:1px solid rgba(92,46,26,.25);margin-bottom:2px;}
  .tech-row{display:grid;grid-template-columns:100px 50px 1fr;gap:0;padding:12px 0;border-bottom:1px dashed rgba(92,46,26,.15);align-items:center;min-height:42px;}
  .tech-row:last-child{border-bottom:none;}
  .tech-cell{border:none;background:transparent;font-family:'Crimson Text',serif;font-size:13px;color:var(--ink);padding:0 6px 0 0;outline:none;width:100%;line-height:1.6;}

  /* Adjusted Print Margins */
  @media print{
    @page{size:A4 portrait;margin:0;}
    html,body{margin:0;padding:0;background:#f5f3f0 !important;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
    body{display:block;padding:0;}
    .sheet{width:210mm;max-width:210mm;min-height:297mm;height:297mm;border:none;box-shadow:none;margin:0;overflow:hidden;}
    .sheet-inner{padding:9mm 11mm 8mm;}
    
    .sheet-header{margin-bottom:25px;padding-bottom:14px;}
    .sheet-title{font-size:18px;letter-spacing:5px;margin-bottom:6px;}
    .sheet-subtitle{font-size:8px;margin-top:6px;}
    
    .identity-row{margin:28px 0 28px;}
    .attr-strip{margin-bottom:30px;}
    
    .attr-cell{padding:4px 3px;}
    .sec{margin-bottom:16px;padding:8px 10px;}
    .tech-row{padding:8px 0;min-height:32px;}.tech-cell{font-size:12px;}
    input{border:none !important;border-bottom:1px solid rgba(92,46,26,.4) !important;background:transparent !important;-webkit-appearance:none;box-shadow:none;}
    .corner{display:none;}.sheet::before{display:none;}
  }
</style>
</head>
<body>
<div class="sheet">
  <div class="corner corner-tl" id="c1"></div><div class="corner corner-tr" id="c2"></div>
  <div class="corner corner-bl" id="c3"></div><div class="corner corner-br" id="c4"></div>
  <div class="sheet-inner">

    <div class="sheet-header">
      <div class="sheet-title">Combat Record</div>
      <div class="sheet-subtitle">Battle Sheet</div>
    </div>

    <div class="identity-row">
      <div style="display:flex;flex-direction:column;gap:2px;"><div class="fl">Character Name</div><input class="fi" type="text"></div>
    </div>

    <div class="strip-label">Attribute Reference</div>
    <div class="attr-strip" id="attr-strip"></div>

    <div class="sec sec-strain">
      <div class="st">Strain &amp; Injuries</div>
      <div style="height:8px"></div>
      <div class="strain-injury-grid">

        <div class="strain-power-row">
          <div class="die-slot">
            <div class="die-label">Strain</div>
            <div class="die-outline die-outline-lg">
              <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
                <polygon points="32,3 61,19 61,45 32,61 3,45 3,19" stroke="rgba(92,46,26,.5)" stroke-width="1.5" fill="none"/>
              </svg>
              <input class="die-val die-val-lg" type="text" maxlength="2">
            </div>
            <div style="display:flex;gap:12px;margin-top:6px;">
              <div style="display:flex;flex-direction:column;align-items:center;gap:2px;">
                <span class="die-max-label">Toughness</span>
                <input class="die-max-val" type="text" maxlength="2">
              </div>
            </div>
          </div>

          <div class="die-slot">
            <div class="die-label">Power</div>
            <div class="die-outline die-outline-lg">
              <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
                <polygon points="32,3 61,19 61,45 32,61 3,45 3,19" stroke="rgba(92,46,26,.5)" stroke-width="1.5" fill="none"/>
              </svg>
              <input class="die-val die-val-lg" type="text" maxlength="2">
            </div>
          </div>
        </div>

        <div style="border-left:1px dashed rgba(92,46,26,.2);padding-left:24px;">
          <div class="injury-entry">
            <div class="ib" onclick="this.classList.toggle('filled')">I</div>
            <div>
              <div class="injury-label">Effect</div>
              <input class="injury-input" type="text">
            </div>
          </div>
          <div class="injury-entry">
            <div class="ib" onclick="this.classList.toggle('filled')">II</div>
            <div>
              <div class="injury-label">Effect</div>
              <input class="injury-input" type="text">
            </div>
          </div>
          <div class="deaths-door">
            <span class="deaths-door-icon">↓</span>
            <span class="deaths-door-text">Third Injury — Downed</span>
          </div>
        </div>
      </div>
    </div>

    <div class="divider">— ✦ —</div>

    <div class="sec" style="padding-bottom:18px;">
      <div class="st">Techniques</div>
      <div style="height:10px"></div>
      <div class="tech-header">
        <span>Type</span><span>Power</span><span>Description</span>
      </div>
      <div id="tech-container"></div>
    </div>

  </div>
</div>

<script>
const SVG=`<svg viewBox="0 0 50 50" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M5 5 L5 28 M5 5 L28 5" stroke="#5c2e1a" stroke-width="2"/><path d="M5 5 L22 22" stroke="#5c2e1a" stroke-width="1" opacity="0.35"/><circle cx="5" cy="5" r="2.5" fill="#5c2e1a"/><circle cx="28" cy="5" r="1.5" fill="#5c2e1a" opacity="0.5"/><circle cx="5" cy="28" r="1.5" fill="#5c2e1a" opacity="0.5"/><path d="M12 5 L12 8" stroke="#5c2e1a" stroke-width="1" opacity="0.35"/><path d="M5 12 L8 12" stroke="#5c2e1a" stroke-width="1" opacity="0.35"/></svg>`;
['c1','c2','c3','c4'].forEach(id=>document.getElementById(id).innerHTML=SVG);

['MIGHT','SWIFT','EDGE','HEART','MIND'].forEach(a=>{
  const cell=document.createElement('div');cell.className='attr-cell';
  cell.innerHTML=`<div class="attr-abbr">${a}</div>`;
  const inp=document.createElement('input');inp.className='attr-die-ref';inp.type='text';inp.maxLength=4;
  cell.appendChild(inp);document.getElementById('attr-strip').appendChild(cell);
});

// Techniques — Changed from 7 to 9 rows
const tc=document.getElementById('tech-container');
for(let i=0;i<9;i++){
  const row=document.createElement('div');row.className='tech-row';
  const type=document.createElement('input');type.className='tech-cell';type.type='text';
  const power=document.createElement('input');power.className='tech-cell';power.type='text';power.maxLength=3;
  const desc=document.createElement('input');desc.className='tech-cell';desc.type='text';
  row.appendChild(type);row.appendChild(power);row.appendChild(desc);
  tc.appendChild(row);
}
</script>
</body>
</html>
